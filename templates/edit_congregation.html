{% extends "base.html" %}

{% block title %}Edit Congregation{% endblock %}

{% block content %}
<div class="container">
    <h1 class="title">Edit Congregation</h1>

    <form method="POST" action="" class="edit-form">
        
        <!-- READ ONLY: congregation name -->
        <label for="congregation_display">Congregation:</label>
        <input type="text" id="congregation_display" 
               value="{{congregation['name']  }}" 
               disabled>


        <label for="address">Address:</label>
        <input type="text" id="address" name="address" value="{{ congregation['address'] }}" required>

        <label for="municipal_entity">Municipal Entity:</label>
        <input type="text" id="municipal_entity" name="municipal_entity" value="{{ congregation['municipal_entity'] }}" required>

        <label for="denomination">Denomination:</label>
        <input type="text" id="denomination" name="denomination" value="{{ congregation['denomination'] }}">

        <label for="size">Size (sq ft):</label>
        <input type="number" id="size" name="size" value="{{ congregation['size'] }}">

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" value="{{ congregation['email'] }}">

        <label for="phone_number">Phone Number:</label>
        <input type="text" id="phone_number" name="phone_number" value="{{ congregation['phone_number'] }}">

        <label for="website">Website:</label>
        <input type="url" id="website" name="website" value="{{ congregation['website'] }}">

        <div class="button-group">
         <button type="submit" class="save-btn">Save Changes</button>
         <a href="/congregations?id={{ congregation['congregation_id'] }}" class="cancel-btn">Cancel</a>
         </div>
    </form>
</div>

<style>
.container {
    max-width: 650px;
    margin: 40px auto;
    padding: 30px;
    background: #f5fff7;
    border-radius: 18px;
    border: 2px solid rgba(50, 120, 50, 0.2);
    box-shadow: 0 0 15px rgba(90, 140, 90, 0.15);
}

.title {
    font-family: "Georgia", serif;
    font-size: 2.2rem;
    color: #2e5f3e;
    text-align: center;
    margin-bottom: 20px;
    text-shadow: 1px 1px 2px #cfeccc;
}

.edit-form {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.edit-form label {
    font-weight: bold;
    color: #3a6a47;
}

.edit-form input {
    padding: 8px 10px;
    border-radius: 6px;
    border: 1px solid #b6d8b9;
}

.button-group {
    display: flex;
    gap: 10px;
    justify-content: flex-start;
    margin-top: 15px;
}

button {
    padding: 8px 16px;
    border-radius: 6px;
    border: 1px solid #b6d8b9;
    background: #e4ffe8;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #d6f5db;
    transform: translateY(-1px);
}

.cancel-btn {
    padding: 8px 16px;
    border-radius: 6px;
    text-decoration: none;
    background: #fbeaea;
    border: 1px solid #f5c2c2;
    color: #a33;
    line-height: 28px;
    transition: 0.2s;
}

.cancel-btn:hover {
    background: #f6caca;
    transform: translateY(-1px);
}

.save-btn {
    padding: 8px 16px;
    border-radius: 6px;
    text-decoration: none;
    background: #e4ffe8;            /* light green */
    border: 1px solid #b6d8b9;      /* soft green border */
    color: #2e5f3e;                 /* dark green text */
    cursor: pointer;
    line-height: 28px;
    transition: 0.2s;
}

.save-btn:hover {
    background: #d6f5db;            /* slightly darker hover */
    transform: translateY(-1px);
}

</style>
{% endblock %}
