{% extends "base.html" %}

{% block title %}Home{% endblock %}

{% block content %}
<div class="container">

    <!-- Logo -->
    <img src="{{ url_for('static', filename='logo.png') }}" 
         alt="Washtenaw 2030 Logo" 
         class="logo">

    <h1 class="title">Washtenaw Houses of Worship</h1>
    <p class="subtitle">A community database of congregations across Washtenaw County</p>

    <!-- Main Image -->
    <img src="{{ url_for('static', filename='cong_pic.png') }}" 
         alt="Congregation" 
         class="image">

    <ul class="links">
        <li><a href="/congregations">➤ View Congregations</a></li>
        {% if current_user.is_authenticated %}
           <li><a href="/forms">➤ Add New Data</a></li>
        {% endif %}
    </ul>
</div>

<style>
    .container {
        max-width: 700px;
        margin: 40px auto;
        padding: 35px;
        background: #f5fff7;
        border-radius: 20px;
        box-shadow: 0 0 25px rgba(90, 140, 90, 0.18);
        border: 2px solid rgba(50, 120, 50, 0.2);
        backdrop-filter: blur(3px);
        animation: fadeIn 1s ease-out;
        text-align: center;
    }

    .logo {
        width: 240px;
        margin-bottom: 15px;
    }

    .title {
        font-family: "Georgia", serif;
        font-size: 2.4rem;
        color: #2e5f3e;
        margin-bottom: 10px;
        text-shadow: 1px 1px 2px #cfeccc;
    }

    .subtitle {
        color: #3a6a47;
        font-size: 1.1rem;
        margin-bottom: 25px;
    }

    .image {
        width: 100%;
        max-height: 320px;
        object-fit: cover;
        border-radius: 14px;
        border: 1px solid #b7dcbc;
        box-shadow: 0 0 15px rgba(80, 130, 80, 0.2);
        margin-bottom: 30px;
    }

    .links {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .links li {
        margin: 15px 0;
    }

    .links a {
        font-size: 1.2rem;
        color: #2d6a3b;
        text-decoration: none;
        padding: 12px 20px;
        border-radius: 10px;
        background: linear-gradient(135deg, #e5ffe9, #d7f7da);
        border: 1px solid #b7dcbc;
        box-shadow: 0 0 10px rgba(80, 130, 80, 0.15);
        transition: 0.2s ease;
        display: inline-block;
    }

    .links a:hover {
        background: linear-gradient(135deg, #dfffe4, #c9f3ce);
        transform: translateY(-2px);
        box-shadow: 0 0 12px rgba(70, 120, 70, 0.25);
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
{% endblock %}
