{% extends "base.html" %}

{% block title %}Edit Facility{% endblock %}

{% block content %}
<div class="container">
    <h1 class="title">Edit Facility</h1>

    <form method="POST" action="" class="edit-form">

        <!-- READ ONLY: congregation name -->
        <label for="congregation_display">Congregation:</label>
        <input type="text" id="congregation_display" 
               value="{{ congregation_name }}" 
               disabled>

        <!-- SIZE -->
        <label for="facility_size">Facility Size (sq ft):</label>
        <input type="number" id="facility_size" name="facility_size" 
               value="{{ facility['facility_size'] }}" required>

        <!-- YEAR BUILT -->
        <label for="year_built">Year Built:</label>
        <input type="number" id="year_built" name="year_built" 
               value="{{ facility['year_built'] }}">

        <!-- HEATING -->
        <label for="heating_sys">Heating System:</label>
        <input type="text" id="heating_sys" name="heating_sys" 
               value="{{ facility['heating_sys'] }}">

        <!-- VENTILATION -->
        <label for="vent_sys">Ventilation System:</label>
        <input type="text" id="vent_sys" name="vent_sys" 
               value="{{ facility['vent_sys'] }}">

        <!-- AC SYSTEM -->
        <label for="ac_sys">AC System:</label>
        <input type="text" id="ac_sys" name="ac_sys" 
               value="{{ facility['ac_sys'] }}">

        <!-- BILL -->
        <label for="est_electric_bill">Estimated Electric Bill:</label>
        <input type="number" step="0.01" id="est_electric_bill" 
               name="est_electric_bill"
               value="{{ facility['est_electric_bill'] }}">

        <div class="button-group">
            <button type="submit" class="button">Save Changes</button>
            <a href="/congregations?id={{ facility['congregation_id'] }}" class="button button-reject">Cancel</a>
        </div>

    </form>
</div>

{% endblock %}
