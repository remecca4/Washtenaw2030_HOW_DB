{% extends "base.html" %}

{% block title %}Manage Users{% endblock %}

{% block content %}
<h2>Create User</h2>

<form method="POST" action="/admin/manage-users/create-user" style="max-width:400px;">
    <label>Email</label>
    <input type="email" name="email" required>

    <label>Password</label>
    <input type="password" name="password" required>

    <label>Role</label>
    <select name="role">
        <option value="user">User</option>
        <option value="admin">Admin</option>
    </select>

    <button type="submit">Create</button>
</form>



<h2>Remove User</h2>

<form method="POST" action="/admin/manage-users/remove-user" style="max-width:400px;">
    <label>Email</label>
    <input type="email" name="email" required>

    <button type="submit" class="btn btn-danger" onclick="return confirm('Remove this user?')">Remove</button>
</form>
{% endblock %}
